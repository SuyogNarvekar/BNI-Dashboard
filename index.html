<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNI Super Achievers — Abundance Championship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafafa;--bg2:#ffffff;--bg3:#f0f0f0;--border:#e0e0e0;--border2:#d0d0d0;
  --text:#333;--text2:#777;--white:#111;--card-shadow:0 1px 4px rgba(0,0,0,0.06);
  --bni-red:#cf2030;--bni-dark:#a01020;--gold:#d4940a;--blue:#1a73c7;--green:#1a8a5a;--purple:#7c3aed;
  --prop:#cf2030;--biz:#d4940a;--cps:#1a73c7;--lf:#1a8a5a;
  --font-display:'Oswald',sans-serif;--font-body:'Source Sans 3',sans-serif;
  --bar-bg:#e8e8e8;
}
[data-theme="dark"]{
  --bg:#08080f;--bg2:#0e0e1a;--bg3:#161625;--border:#1e1e30;--border2:#2a2a40;
  --text:#c8c8e0;--text2:#7878a0;--white:#f0f0ff;--card-shadow:0 2px 8px rgba(0,0,0,0.3);
  --bar-bg:#1a1a2e;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background 0.3s,color 0.3s}
.header{background:var(--bni-red);color:#fff;padding:24px 0 20px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--green),var(--blue),var(--purple))}
.header-inner{max-width:960px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.header-logos{display:flex;align-items:center;gap:16px}
.header-logos img{height:52px;border-radius:4px}
.header-logos img.abd-logo{height:40px;border-radius:8px}
.header-text{flex:1}
.header-text h1{font-family:var(--font-display);font-size:clamp(22px,4vw,34px);font-weight:700;letter-spacing:2px;line-height:1.1}
.header-text .sub{font-size:12px;letter-spacing:4px;opacity:0.8;margin-top:4px;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:10px}
.period-badge{background:rgba(0,0,0,0.2);padding:5px 14px;border-radius:4px;font-size:12px;font-weight:600}
.theme-toggle{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.container{max-width:960px;margin:0 auto;padding:0 20px}
.nav{display:flex;gap:0;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;transition:background 0.3s}
.nav-tab{padding:14px 28px;background:none;border:none;color:var(--text2);cursor:pointer;font-family:var(--font-display);font-size:14px;letter-spacing:2px;text-transform:uppercase;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--bni-red);border-bottom-color:var(--bni-red)}
.section{display:none;padding:24px 0 48px;animation:fadeUp 0.3s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:var(--font-display);font-size:22px;letter-spacing:2px;color:var(--white);margin-bottom:16px;text-transform:uppercase}
.search-input{width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font-body);outline:none;transition:border-color 0.2s;margin-bottom:12px}
.search-input:focus{border-color:var(--bni-red)}
.search-input::placeholder{color:var(--text2)}
.pt-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;box-shadow:var(--card-shadow);position:relative;overflow:hidden}
.pt-accent{position:absolute;top:0;left:0;width:5px;height:100%}
.pt-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.pt-rank{font-family:var(--font-display);font-size:38px;color:var(--border2);width:48px;text-align:center;line-height:1}
.pt-rank.gold{color:var(--gold)}
.pt-name{font-family:var(--font-display);font-size:18px;color:var(--white);font-weight:600;letter-spacing:1px}
.pt-count{font-size:12px;color:var(--text2)}
.pt-avg-box{text-align:right;margin-left:auto}
.pt-avg-num{font-family:var(--font-display);font-size:36px;color:var(--white);line-height:1}
.pt-avg-label{font-size:9px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.pt-bar-bg{height:6px;background:var(--bar-bg);border-radius:3px;overflow:hidden;margin-bottom:10px}
.pt-bar{height:100%;border-radius:3px;transition:width 0.8s ease}
.pt-meta{display:flex;gap:16px;font-size:12px;color:var(--text2);flex-wrap:wrap}
.pt-meta b{color:var(--text);font-weight:600}
.pt-expand-btn{display:block;width:100%;background:none;border:none;cursor:pointer;padding:8px 0 0;font-size:11px;color:var(--text2);letter-spacing:1px;font-family:var(--font-display);text-transform:uppercase;transition:color 0.2s}
.pt-expand-btn:hover{color:var(--bni-red)}
.pt-expand-btn .arrow{display:inline-block;transition:transform 0.3s;font-size:14px}
.pt-card.expanded .pt-expand-btn .arrow{transform:rotate(180deg)}
.pt-members{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
.pt-card.expanded .pt-members{max-height:4000px;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}
.m-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:3px;cursor:pointer;transition:background 0.12s}
.m-row:hover{background:var(--bg3)}
.m-rank{font-family:var(--font-display);font-size:17px;color:var(--border2);width:34px;text-align:center}
.m-rank.top3{color:var(--gold)}
.m-badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;color:#fff;letter-spacing:1px}
.m-name{font-size:13px;font-weight:500;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-pts{font-family:var(--font-display);font-size:17px;color:var(--white)}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:200;justify-content:center;align-items:flex-start;padding:32px 16px;overflow-y:auto}
.overlay.open{display:flex}
.detail{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:100%;max-width:580px;padding:24px;animation:fadeUp 0.2s ease;position:relative}
.detail-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer}
.detail-close:hover{color:var(--white)}
.detail-head{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap}
.detail-badge{padding:5px 12px;border-radius:4px;font-family:var(--font-display);font-size:13px;font-weight:700;color:#fff;letter-spacing:2px}
.detail-name{font-family:var(--font-display);font-size:24px;color:var(--white);font-weight:600}
.detail-pt{font-size:12px;color:var(--text2)}
.detail-total-box{margin-left:auto;text-align:right}
.detail-total-num{font-family:var(--font-display);font-size:40px;color:var(--white);line-height:1}
.detail-total-label{font-size:9px;letter-spacing:2px;color:var(--text2)}
.bd-item{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:5px}
.bd-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bd-label{color:var(--text)}.bd-pts{font-weight:700}
.bd-sub{font-size:10px;color:var(--text2);margin-bottom:3px}
.bd-bar-bg{height:3px;background:var(--bar-bg);border-radius:2px;overflow:hidden}
.bd-bar{height:100%;border-radius:2px}
.stats-grid{display:grid;grid-template-columns:1fr;gap:16px}
.stat-block{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;box-shadow:var(--card-shadow)}
.stat-block-title{font-family:var(--font-display);font-size:16px;letter-spacing:2px;color:var(--white);margin-bottom:14px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.stat-block-title span{font-size:20px}
.leader-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px}
.leader-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;position:relative;overflow:hidden;cursor:pointer;transition:transform 0.12s}
.leader-card:hover{transform:translateY(-2px)}
.leader-card .accent-bar{position:absolute;top:0;left:0;right:0;height:3px}
.lc-icon{font-size:28px;margin-bottom:4px}
.lc-label{font-size:9px;letter-spacing:1.5px;color:var(--text2);text-transform:uppercase;font-weight:600}
.lc-name{font-family:var(--font-display);font-size:16px;color:var(--white);margin:4px 0 2px;font-weight:600}
.lc-sub{font-size:12px;color:var(--text2)}
.chart-svg{width:100%;height:auto}
.tooltip{position:fixed;z-index:300;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 18px;box-shadow:0 4px 20px rgba(0,0,0,0.25);max-width:320px;pointer-events:none;opacity:0;transition:opacity 0.15s;font-size:12px;line-height:1.6}
.tooltip.show{opacity:1}
.tooltip-title{font-family:var(--font-display);font-size:14px;color:var(--white);letter-spacing:1px;margin-bottom:6px}
.tooltip-body{color:var(--text)}
.tooltip-body b{color:var(--white)}
.heatmap-table{width:100%;border-collapse:collapse;font-size:11px}
.heatmap-table th{font-family:var(--font-display);font-size:10px;letter-spacing:1px;color:var(--text2);padding:6px 4px;text-align:center;font-weight:500;border-bottom:1px solid var(--border)}
.heatmap-table td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);font-weight:600;font-size:11px;cursor:pointer}
.heatmap-table td:hover{outline:2px solid var(--bni-red);outline-offset:-1px}
.heatmap-table .pt-label{text-align:left;font-family:var(--font-display);font-size:12px;color:var(--white);letter-spacing:1px;white-space:nowrap;cursor:default}
.dist-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;cursor:pointer}
.dist-row:hover .dist-bar{filter:brightness(1.15)}
.dist-label{font-size:12px;color:var(--text);width:100px;text-align:right;flex-shrink:0}
.dist-bar-bg{flex:1;height:22px;background:var(--bar-bg);border-radius:4px;overflow:hidden}
.dist-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;min-width:28px;transition:width 0.6s ease}



@media(max-width:600px){
  .header-inner{gap:12px}.header-logos img{height:40px}.header-logos img.abd-logo{height:30px}
  .nav-tab{padding:12px 14px;font-size:12px;letter-spacing:1px}.pt-avg-num{font-size:28px}
  .leader-cards{grid-template-columns:1fr 1fr}
}
@media print{
  .nav,.theme-toggle,.search-input,.pdf-float,.tooltip{display:none!important}
  .section{display:block!important;break-inside:avoid}
  .stat-block{break-inside:avoid;margin-bottom:12px}
  .pt-card{break-inside:avoid;margin-bottom:8px}
  .pt-members{max-height:none!important;display:block!important;padding-top:8px!important}
  .pt-expand-btn{display:none!important}
  body,[data-theme="dark"]{background:#fff!important;color:#222!important;--bg:#fff;--bg2:#f8f8f8;--bg3:#f0f0f0;--border:#ddd;--text:#222;--text2:#666;--white:#111;--bar-bg:#e0e0e0;--card-shadow:none}
  .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{margin:12mm 10mm;size:A4}
}
</style>
</head>

const tipEl=document.getElementById('tooltipEl');
function showTip(ev,title,body){
  tipEl.innerHTML='<div class="tooltip-title">'+title+'</div><div class="tooltip-body">'+body+'</div>';
  tipEl.classList.add('show');
  let x=ev.clientX+14,y=ev.clientY+14;
  tipEl.style.left=x+'px';tipEl.style.top=y+'px';
  requestAnimationFrame(()=>{
    const r=tipEl.getBoundingClientRect();
    if(x+r.width>window.innerWidth)tipEl.style.left=(ev.clientX-r.width-14)+'px';
    if(y+r.height>window.innerHeight)tipEl.style.top=(ev.clientY-r.height-14)+'px';
  });
}
function hideTip(){tipEl.classList.remove('show')}

const PT_META={
  "Property":{short:"PROP",color:"#cf2030",light:"#e94560"},
  "Business Owners and HNIs":{short:"BIZ",color:"#d4940a",light:"#f5c542"},
  "Corporate Products & Services":{short:"CPS",color:"#1a73c7",light:"#4da3ff"},
  "Legal & Finance":{short:"L&F",color:"#1a8a5a",light:"#34d399"}
};
const PT_LIST=["Property","Business Owners and HNIs","Corporate Products & Services","Legal & Finance"];
const CATEGORIES=[
  {key:"discipline",label:"Discipline",items:["earlyArrival","ptMeeting"]},
  {key:"bizGen",label:"Biz Generation",items:["visitors","powerDate","oneToOne"]},
  {key:"revenue",label:"Revenue",items:["tyfcbPts"]},
  {key:"engagement",label:"Engagement",items:["themed30s","referrals"]},
  {key:"learning",label:"Learning",items:["training","testimonials"]},
  {key:"growth",label:"Growth",items:["induction","doorPrize"]}
];

function tc(s){return s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' ')}
function fL(n){return '\u20B9'+(n/100000).toFixed(1)+'L'}
function esc(s){return s.replace(/'/g,"\\'")}

// Compute
function computePT(){
  const d={};PT_LIST.forEach(pt=>{d[pt]={total:0,members:0,tyfcb:0,visitors:0,o2o:0,cats:{}}});
  ROSTER.forEach(m=>{
    const s=SCORES[m.name];if(!s||!d[m.pt])return;
    d[m.pt].total+=s.total;d[m.pt].members+=1;d[m.pt].tyfcb+=s.tyfcbAmt;
    d[m.pt].visitors+=s.visitors/300;d[m.pt].o2o+=s.oneToOne/100;
    CATEGORIES.forEach(c=>{if(!d[m.pt].cats[c.key])d[m.pt].cats[c.key]=0;c.items.forEach(k=>{d[m.pt].cats[c.key]+=(s[k]||0)})});
  });
  return PT_LIST.map(pt=>({name:pt,...d[pt],avg:d[pt].members?Math.round(d[pt].total/d[pt].members):0,
    memberList:ROSTER.filter(m=>m.pt===pt).map(m=>({name:m.name,total:SCORES[m.name]?.total||0})).sort((a,b)=>b.total-a.total)
  })).sort((a,b)=>b.avg-a.avg);
}
const ptData=computePT();
const indivData=ROSTER.map(m=>({name:m.name,pt:m.pt,total:SCORES[m.name]?.total||0,tyfcb:SCORES[m.name]?.tyfcbAmt||0})).sort((a,b)=>b.total-a.total);
const maxAvg=Math.max(...ptData.map(p=>p.avg),1);

      +'<div class="m-rank '+(mi<3?'top3':'')+'">#'+(mi+1)+'</div>'
      +'<div class="m-name">'+tc(m.name)+'</div>'

    return '<div class="pt-card"><div class="pt-accent" style="background:'+c.color+'"></div>'

      +'<div class="pt-avg-box"><div class="pt-avg-num">'+pt.avg.toLocaleString()+'</div><div class="pt-avg-label">Avg Points</div></div></div>'
      +'<div class="pt-bar-bg"><div class="pt-bar" style="width:'+bw+'%;background:linear-gradient(90deg,'+c.color+','+c.light+')"></div></div>'
      +'<div class="pt-meta"><span>Total: <b>'+pt.total.toLocaleString()+'</b></span><span>TYFCB: <b>'+fL(pt.tyfcb)+'</b></span>'
      +'<span>Visitors: <b>'+Math.round(pt.visitors)+'</b></span><span>1-2-1s: <b>'+Math.round(pt.o2o)+'</b></span></div>'
      +'<button class="pt-expand-btn" onclick="togglePT(this)">VIEW MEMBERS <span class="arrow">\u25BC</span></button>'

function renderIndiv(f){

    .filter(m=>!f||m.name.toLowerCase().includes(f)||m.pt.toLowerCase().includes(f))
    .map((m,i)=>{const c=PT_META[m.pt];
      return '<div class="m-row" onclick="showDetail(\''+esc(m.name)+'\')">'
        +'<div class="m-rank '+(i<3?'top3':'')+'">#'+(i+1)+'</div>'
        +'<div class="m-badge" style="background:'+(c?.color||'#555')+'">'+(c?.short||'?')+'</div>'
        +'<div class="m-name">'+tc(m.name)+'</div><div class="m-pts">'+m.total.toLocaleString()+'</div></div>';
    }).join('');
}

// ═══ DETAIL ═══
function showDetail(name){
  const s=SCORES[name];if(!s)return;const m=ROSTER.find(r=>r.name===name);const c=PT_META[m.pt];
  const items=[
    {l:'Early Arrival',p:s.earlyArrival,c:'var(--bni-red)'},
    {l:'Visitors Invited',p:s.visitors,c:'var(--gold)',s:(s.visitors/300)+' visitors'},
    {l:'1-2-1 Conducted',p:s.oneToOne,c:'var(--blue)',s:(s.oneToOne/100)+' meetings'},
    {l:'TYFCB',p:s.tyfcbPts,c:'var(--green)',s:fL(s.tyfcbAmt)},
    {l:'Testimonials',p:s.testimonials,c:'var(--purple)'},
    {l:'PT Meeting',p:s.ptMeeting,c:'#64748b'},{l:'Power Date',p:s.powerDate,c:'#64748b'},
    {l:'Themed 30s',p:s.themed30s,c:'#64748b'},{l:'Referrals',p:s.referrals,c:'var(--gold)',s:((s.referrals||0)/10)+' referrals'},
    {l:'BNI Training',p:s.training,c:'#64748b'},{l:'Induction',p:s.induction,c:'#64748b'},
    {l:'Door Prize',p:s.doorPrize,c:'#64748b'}
  ];
  const mx=Math.max(...items.map(x=>x.p),1);
  document.getElementById('detailCard').innerHTML=
    '<button class="detail-close" onclick="closeDetail()">\u2715</button>'
    +'<div class="detail-head"><div class="detail-badge" style="background:'+c.color+'">'+c.short+'</div><div><div class="detail-name">'+tc(name)+'</div><div class="detail-pt">'+m.pt+'</div></div>'
    +'<div class="detail-total-box"><div class="detail-total-num">'+s.total.toLocaleString()+'</div><div class="detail-total-label">Total Points</div></div></div>'
    +items.map(it=>'<div class="bd-item"><div class="bd-top"><span class="bd-label">'+it.l+'</span><span class="bd-pts" style="color:'+it.c+'">'+it.p+'</span></div>'
      +(it.s?'<div class="bd-sub">'+it.s+'</div>':'')+'<div class="bd-bar-bg"><div class="bd-bar" style="width:'+(it.p/mx*100)+'%;background:'+it.c+'"></div></div></div>').join('');
  document.getElementById('overlay').classList.add('open');
}
function closeDetail(){document.getElementById('overlay').classList.remove('open')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDetail()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

    const t3=pt.memberList.slice(0,3).map((m,j)=>'#'+(j+1)+' '+tc(m.name)+' ('+m.total+')').join('<br>');
    h+='<g style="cursor:pointer" onmousemove="showTip(event,\''+c.short+'\',\'<b>Avg: '+pt.avg+'</b> | Total: '+pt.total.toLocaleString()+'<br>Members: '+pt.members+'<br><br><b>Top 3:</b><br>'+t3+'\')" onmouseleave="hideTip()">';
    h+='<text x="'+lW+'" y="'+(y+bH/2+5)+'" text-anchor="end" style="font-family:var(--font-display);font-size:14px;fill:var(--white)">'+c.short+'</text>';
    h+='<rect x="'+(lW+10)+'" y="'+y+'" width="'+bw+'" height="'+bH+'" rx="5" fill="'+c.color+'"/>';
    h+='<text x="'+(lW+18)+'" y="'+(y+bH/2+4)+'" style="font-size:11px;fill:#fff;font-family:var(--font-display)">'+pt.members+' mbrs</text>';
    h+='<text x="'+(lW+bw+16)+'" y="'+(y+bH/2+5)+'" style="font-family:var(--font-display);font-size:16px;fill:var(--white);font-weight:600">'+pt.avg.toLocaleString()+' avg</text>';
    h+='</g>';
  });
  h+='</svg></div>';

  // 3. Radar (interactive with checkboxes)
  h+='<div class="stat-block"><div class="stat-block-title"><span>🎯</span> Category Strength</div>';
  h+='<div id="radarCheckboxes" style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px">';
  ptData.forEach(pt=>{
    const c=PT_META[pt.name];
    h+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text);user-select:none">'
      +'<input type="checkbox" checked data-pt="'+pt.name+'" onchange="updateRadar()" style="accent-color:'+c.color+';width:16px;height:16px;cursor:pointer">'
      +'<span style="width:10px;height:10px;border-radius:2px;background:'+c.color+';display:inline-block"></span>'
      +c.short+'</label>';
  });
  h+='</div>';
  h+='<div id="radarContainer"></div></div>';

  // Radar draw function (called on checkbox change)
  window.radarPtData=ptData;
  window.radarCatMax=null;
  window.updateRadar=function(){
    const checks=document.querySelectorAll('#radarCheckboxes input[type=checkbox]');
    const activePTs=[];checks.forEach(ch=>{if(ch.checked)activePTs.push(ch.dataset.pt)});
    const activeData=window.radarPtData.filter(pt=>activePTs.includes(pt.name));
    const rR=100,cx=160,cy=130,rW=700,rH=280,n=CATEGORIES.length;
    // Recalculate max based on active PTs only
    const catMx={};CATEGORIES.forEach(c=>{catMx[c.key]=Math.max(...activeData.map(pt=>(pt.cats[c.key]||0)/pt.members),0.01)});
    let svg='<svg class="chart-svg" viewBox="0 0 '+rW+' '+rH+'">';
    // Grid lines
    for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;
      svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+Math.cos(a)*rR)+'" y2="'+(cy+Math.sin(a)*rR)+'" stroke="var(--border)" stroke-width="0.5"/>';
      const tx=cx+Math.cos(a)*(rR+16),ty=cy+Math.sin(a)*(rR+16);
      svg+='<text x="'+tx+'" y="'+(ty+3)+'" text-anchor="middle" style="font-size:9px;fill:var(--text2);font-family:var(--font-display);letter-spacing:1px">'+CATEGORIES[i].label.toUpperCase()+'</text>';
    }
    [0.25,0.5,0.75,1].forEach(r=>{let p='';for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;p+=(cx+Math.cos(a)*rR*r)+','+(cy+Math.sin(a)*rR*r)+' ';}svg+='<polygon points="'+p+'" fill="none" stroke="var(--border)" stroke-width="0.5"/>'});
    // PT polygons
    activeData.forEach(pt=>{const c=PT_META[pt.name];let p='';
      const det=CATEGORIES.map(cat=>{const av=Math.round((pt.cats[cat.key]||0)/pt.members);return cat.label+': <b>'+av+'</b>'}).join('<br>');
      for(let i=0;i<n;i++){const cat=CATEGORIES[i];const v=(pt.cats[cat.key]||0)/pt.members;const nm=Math.max(v/catMx[cat.key],0.02);
        const a=Math.PI*2*i/n-Math.PI/2;p+=(cx+Math.cos(a)*rR*nm)+','+(cy+Math.sin(a)*rR*nm)+' ';}
      svg+='<polygon points="'+p+'" fill="'+c.color+'" fill-opacity="'+(activeData.length===1?'0.2':'0.12')+'" stroke="'+c.color+'" stroke-width="'+(activeData.length===1?'2.5':'1.8')+'" style="cursor:pointer" onmousemove="showTip(event,\''+c.short+'\',\''+det+'\')" onmouseleave="hideTip()"/>';
    });
    // Legend
    let lx=340,ly=40;
    activeData.forEach((pt,i)=>{const c=PT_META[pt.name];
      svg+='<rect x="'+lx+'" y="'+(ly+i*26)+'" width="14" height="14" rx="2" fill="'+c.color+'"/>';
      svg+='<text x="'+(lx+22)+'" y="'+(ly+i*26+11)+'" style="font-size:12px;fill:var(--text)">'+pt.name+'</text>';
    });
    if(activeData.length===0){svg+='<text x="350" y="140" text-anchor="middle" style="font-size:14px;fill:var(--text2)">Select at least one Power Team</text>';}
    svg+='</svg>';
    document.getElementById('radarContainer').innerHTML=svg;
  };

  // 4. Heatmap
  const hmL=["Early Arr","Visitors","1-2-1","TYFCB","Testi","PT Mtg","P.Date","30s","Referrals","Train","Induct","Prize"];
  const hmK=["earlyArrival","visitors","oneToOne","tyfcbPts","testimonials","ptMeeting","powerDate","themed30s","referrals","training","induction","doorPrize"];
  h+='<div class="stat-block"><div class="stat-block-title"><span>🔥</span> Participation Heatmap</div><div style="overflow-x:auto"><table class="heatmap-table"><tr><th></th>';
  hmL.forEach(l=>{h+='<th>'+l+'</th>'});h+='</tr>';
  ptData.forEach(pt=>{const c=PT_META[pt.name];h+='<tr><td class="pt-label" style="color:'+c.color+'">'+c.short+'</td>';
    hmK.forEach((k,ki)=>{
      let sum=0;const ctr=[];pt.memberList.forEach(m=>{const v=SCORES[m.name]?.[k]||0;sum+=v;if(v>0)ctr.push(tc(m.name)+': '+v)});
      const avg=Math.round(sum/pt.members);
      const mx=Math.max(...ptData.map(p=>{let s=0;p.memberList.forEach(m=>{s+=(SCORES[m.name]?.[k]||0)});return s/p.members}),0.01);
      const int=avg/mx;const bg=int>0.7?c.color+'cc':int>0.4?c.color+'66':int>0?c.color+'22':'transparent';
      const tc2=int>0.5?'#fff':'var(--text)';
      const tip=ctr.length?ctr.slice(0,6).join('<br>')+(ctr.length>6?'<br>...+'+(ctr.length-6)+' more':''):'No activity';
      h+='<td style="background:'+bg+';color:'+tc2+'" onmousemove="showTip(event,\''+c.short+' \u2014 '+hmL[ki]+'\',\'Avg: <b>'+avg+'</b><br>Total: '+sum+'<br><br><b>Top contributors:</b><br>'+tip+'\')" onmouseleave="hideTip()">'+avg+'</td>';
    });h+='</tr>';});
  h+='</table></div></div>';

  // 5. TYFCB
  const slabs=[{l:'Below \u20B910L',mn:0,mx:999999,p:'0'},{l:'\u20B910L\u201350L',mn:1000000,mx:4999999,p:'200'},{l:'\u20B950L\u20131Cr',mn:5000000,mx:9999999,p:'400'},{l:'\u20B91Cr+',mn:10000000,mx:1e15,p:'500'}];
  const sMem=slabs.map(s=>ROSTER.filter(m=>{const a=SCORES[m.name]?.tyfcbAmt||0;return a>=s.mn&&a<=s.mx}).map(m=>({n:m.name,a:SCORES[m.name]?.tyfcbAmt||0})));
  const sC=sMem.map(s=>s.length);const sMx=Math.max(...sC,1);
  const sCol=['#94a3b8','var(--gold)','var(--blue)','var(--green)'];
  h+='<div class="stat-block"><div class="stat-block-title"><span>💰</span> TYFCB Distribution</div>';
  slabs.forEach((s,i)=>{
    const pct=sC[i]/sMx*100;
    const mem=sMem[i].sort((a,b)=>b.a-a.a).slice(0,8);
    const tip='<b>'+sC[i]+' members</b> ('+s.p+' pts)<br><br>'+(mem.map(m=>tc(m.n)+': '+fL(m.a)).join('<br>')||'None')+(sMem[i].length>8?'<br>...+'+(sMem[i].length-8)+' more':'');
    h+='<div class="dist-row" onmousemove="showTip(event,\''+s.l+'\',\''+tip+'\')" onmouseleave="hideTip()"><div class="dist-label">'+s.l+'</div><div class="dist-bar-bg"><div class="dist-bar" style="width:'+pct+'%;background:'+sCol[i]+'">'+sC[i]+'</div></div></div>';
  });
  h+='</div>';

  // 6. Score Distribution
  const aT=ROSTER.map(m=>({n:m.name,t:SCORES[m.name]?.total||0}));
  const mxT=Math.max(...aT.map(m=>m.t),1);const bS=200;const nB=Math.ceil(mxT/bS)+1;
  const bk=Array.from({length:nB},()=>[]);aT.forEach(m=>{bk[Math.min(Math.floor(m.t/bS),nB-1)].push(m)});
  const bMx=Math.max(...bk.map(b=>b.length),1);
  const hw=700,hh=200,pl=50,pb=30,pt2=10,ch=hh-pb-pt2;
  const bw2=Math.min(22,(hw-pl-10)/nB-2);
  h+='<div class="stat-block"><div class="stat-block-title"><span>📈</span> Score Distribution</div><svg class="chart-svg" viewBox="0 0 '+hw+' '+hh+'">';
  h+='<line x1="'+pl+'" y1="'+pt2+'" x2="'+pl+'" y2="'+(hh-pb)+'" stroke="var(--border)" stroke-width="0.5"/>';
  h+='<line x1="'+pl+'" y1="'+(hh-pb)+'" x2="'+(hw-10)+'" y2="'+(hh-pb)+'" stroke="var(--border)" stroke-width="0.5"/>';
  bk.forEach((b,i)=>{
    const x=pl+4+i*((hw-pl-10)/nB);const bh=(b.length/bMx)*ch;const y=hh-pb-bh;
    const int=b.length/bMx;const col=int>0.6?'var(--bni-red)':int>0.3?'var(--gold)':'var(--blue)';
    const rng=(i*bS)+'\u2013'+((i+1)*bS);
    const mem=b.sort((a,c)=>c.t-a.t).slice(0,5).map(m=>tc(m.n)+': '+m.t).join('<br>');
    const tip='<b>'+b.length+' members</b><br>Range: '+rng+'<br><br>'+(mem||'None')+(b.length>5?'<br>...+'+(b.length-5)+' more':'');
    if(b.length>0){h+='<rect x="'+x+'" y="'+y+'" width="'+bw2+'" height="'+bh+'" rx="2" fill="'+col+'" opacity="0.75" style="cursor:pointer" onmousemove="showTip(event,\''+rng+' pts\',\''+tip+'\')" onmouseleave="hideTip()"/>';
      if(b.length>1)h+='<text x="'+(x+bw2/2)+'" y="'+(y-4)+'" text-anchor="middle" style="font-size:9px;fill:var(--text2);pointer-events:none">'+b.length+'</text>';}
    if(i%3===0)h+='<text x="'+(x+bw2/2)+'" y="'+(hh-pb+14)+'" text-anchor="middle" style="font-size:8px;fill:var(--text2);pointer-events:none">'+(i*bS)+'</text>';
  });
  h+='<text x="'+((hw+pl)/2)+'" y="'+(hh-2)+'" text-anchor="middle" style="font-size:10px;fill:var(--text2);font-family:var(--font-display);letter-spacing:1px;pointer-events:none">POINTS</text>';
  h+='</svg></div>';

  el.innerHTML='<div class="section-title">Stats & Infographics</div><div class="stats-grid">'+h+'</div>';
  window.updateRadar();
})();

// Scoring Tab
(function(){
  var el=document.getElementById('sec-scoring');
  if(!el)return;
  var h='<div class="section-title">SCORING GUIDE</div>';
  h+='<div style="font-size:13px;color:var(--text2);margin-bottom:16px">Every action earns points for you and your Power Team. Here is the complete breakdown.</div>';
  var sections=[
    {title:'DISCIPLINE & COMMITMENT',icon:'\u23F0',color:'var(--bni-red)',items:[
      {c:'Early Arrival (Before National Anthem)',p:'100',u:'per meeting',src:'PALMS',n:'Present or Medical attendance counts. Late and Substitute do not.'},
      {c:'Attendance in PT Meeting',p:'200',u:'per meeting',src:'Manual',n:'Follow-up with PT Captains for attendance crosscheck.'}
    ]},
    {title:'BUSINESS GENERATION',icon:'\uD83E\uDD1D',color:'var(--blue)',items:[
      {c:'Visitor Invited (Qualified & Attended)',p:'300',u:'per visitor',src:'PALMS',n:'Visitor must be qualified and must attend the meeting.'},
      {c:'Power Date Arranged',p:'200',u:'per instance',src:'Manual',n:'Based on WhatsApp group photo proof.'},
      {c:'1-2-1 Conducted',p:'100',u:'per meeting',src:'PALMS',n:'Recorded one-to-one meetings with chapter members.'},
      {c:'Referrals Given (Inside + Outside)',p:'10',u:'per referral',src:'PALMS',n:'Both RGI and RGO count. Every referral matters.'}
    ]},
    {title:'REVENUE IMPACT (TYFCB)',icon:'\uD83D\uDCB0',color:'var(--green)',items:[
      {c:'Below \u20B910 Lakhs',p:'0',u:'\u2014',src:'PALMS',n:'Base threshold not met.'},
      {c:'\u20B910L \u2013 \u20B950 Lakhs',p:'200',u:'slab',src:'PALMS',n:'Only closed and recorded TYFCB qualifies.'},
      {c:'\u20B950L \u2013 \u20B91 Crore',p:'400',u:'slab',src:'PALMS',n:'Cumulative TYFCB for the reporting period.'},
      {c:'\u20B91 Crore and above',p:'500',u:'slab',src:'PALMS',n:'Maximum slab.'}
    ]},
    {title:'ENGAGEMENT & PARTICIPATION',icon:'\uD83C\uDFA4',color:'var(--purple)',items:[
      {c:'Themed 30 Seconds',p:'100',u:'per meeting',src:'Manual',n:'Judged by the 30-Second Judge of that week.'}
    ]},
    {title:'LEARNING & VALUE',icon:'\uD83C\uDF93',color:'var(--blue)',items:[
      {c:'BNI Training Attended',p:'200',u:'per training',src:'Training Report',n:'Any BNI-recognized training or workshop.'},
      {c:'Testimonial Given',p:'200',u:'per testimonial',src:'PALMS',n:'Must be emailed to chapter to qualify. No silent appreciation.'}
    ]},
    {title:'GROWTH & RECOGNITION',icon:'\uD83D\uDE80',color:'var(--green)',items:[
      {c:'Member Induction',p:'600',u:'per induction',src:'Manual',n:'Successfully inducted new member into the chapter.'},
      {c:'Door Prize Won',p:'100',u:'per win',src:'Manual',n:'As announced in the meeting.'}
    ]}
  ];
  sections.forEach(function(sec){
    h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;box-shadow:var(--card-shadow);position:relative;overflow:hidden">';
    h+='<div style="position:absolute;top:0;left:0;width:5px;height:100%;background:'+sec.color+'"></div>';
    h+='<div style="font-family:var(--font-display);font-size:16px;letter-spacing:2px;color:var(--white);margin-bottom:14px;display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+sec.icon+'</span>'+sec.title+'</div>';
    sec.items.forEach(function(item){
      h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg3);border-radius:6px;margin-bottom:6px;flex-wrap:wrap">';
      h+='<div style="flex:1;min-width:180px"><div style="font-size:13px;font-weight:600;color:var(--text)">'+item.c+'</div>';
      h+='<div style="font-size:11px;color:var(--text2);margin-top:2px">'+item.n+'</div></div>';
      h+='<div style="text-align:center;min-width:70px"><div style="font-family:var(--font-display);font-size:24px;color:'+sec.color+'">'+item.p+'</div>';
      h+='<div style="font-size:9px;color:var(--text2);letter-spacing:1px;text-transform:uppercase">'+item.u+'</div></div>';
      h+='<div style="background:var(--bg2);padding:3px 10px;border-radius:4px;font-size:10px;color:var(--text2);letter-spacing:1px;font-weight:600">'+item.src+'</div>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:12px;box-shadow:var(--card-shadow);text-align:center">';
  h+='<div style="font-family:var(--font-display);font-size:16px;letter-spacing:2px;color:var(--white);margin-bottom:10px">\u2696\uFE0F HOW THE WINNER IS DECIDED</div>';
  h+='<div style="font-size:15px;color:var(--bni-red);font-weight:700;margin-bottom:8px">Normalized Average = Total PT Points \u00F7 Number of Members</div>';
  h+='<div style="font-size:13px;color:var(--text2);line-height:1.6">This ensures smaller Power Teams compete fairly against larger ones.<br>Zero-scoring members count in the denominator \u2014 <b style="color:var(--text)">no free riders!</b></div>';
  h+='</div>';
  el.innerHTML=h;
})();

// Nav
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');document.getElementById('sec-'+tab.dataset.tab).classList.add('active');
  });
});
</script>
</body>
</html>
